services:
  - type: web
    name: dream-newspaper-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    envVars:
      # === 필수 (Render 대시보드에서 직접 입력) ===
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://qzlcpfrhwjgjafdafrva.supabase.co
      - key: SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6bGNwZnJod2pnamFmZGFmcnZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MDczNjEsImV4cCI6MjA4Njk4MzM2MX0.18j-qj1nRO_5Fg8VnKKtMZx3eydsEcF70FDnoPV2A_o
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      # 외부 크론(GitHub Actions)이 /api/v1/cron/publish 호출 시 사용하는 시크릿.
      # ⚠️ 반드시 GitHub repo Secrets의 CRON_SECRET과 '동일한 값'으로 설정해야
      # 매일 08:00 발행이 작동한다(무료 티어 슬립 대비 핵심 경로).
      - key: CRON_SECRET
        sync: false
      # === 앱 설정 ===
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: https://dream-newspaper-phi.vercel.app
      - key: BACKEND_CORS_ORIGINS
        value: '["https://dream-newspaper-phi.vercel.app","https://dream-newspaper-junholee94s-projects.vercel.app"]'
      # === AI 모델 ===
      - key: ORCHESTRATOR_MODEL
        value: claude-haiku-4-5-20251001
      - key: WRITER_MODEL
        value: claude-haiku-4-5-20251001
      - key: SPONSOR_MODEL
        value: claude-haiku-4-5-20251001
      # === 스케줄러 ===
      - key: PUBLISH_HOUR
        value: "8"
      - key: PUBLISH_MINUTE
        value: "0"
      - key: PUBLISH_TIMEZONE
        value: Asia/Seoul
      # === Google (벡터 임베딩, 선택사항) ===
      - key: GOOGLE_API_KEY
        sync: false
