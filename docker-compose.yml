services:
  # ============================
  # PostgreSQL 16
  # ============================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dream_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dream}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dream_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dream_newspaper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "3005:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dream}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================
  # ChromaDB (벡터 DB)
  # ============================
  chromadb:
    image: chromadb/chroma:latest
    container_name: dream_chromadb
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "3004:8000"
    environment:
      ANONYMIZED_TELEMETRY: "false"
    restart: unless-stopped

  # ============================
  # FastAPI 백엔드
  # ============================
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: dream_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dream}:${POSTGRES_PASSWORD:-dream_secret}@postgres:5432/${POSTGRES_DB:-dream_newspaper}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    ports:
      - "3003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./backend:/app          # 소스 핫리로드용 바인드 마운트
      - /app/.venv              # Docker 빌드 시 생성된 Linux .venv 보호
                                # (Windows .venv로 덮어쓰면 argon2-cffi 바이너리 누락)
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  # ============================
  # Next.js 프론트엔드 - 유저 (3000)
  # ============================
  frontend-user:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3003}
    image: dream-newspaper-frontend
    container_name: dream_frontend_user
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3003}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ============================
  # Next.js 프론트엔드 - 작가 (3001)
  # ============================
  frontend-writer:
    image: dream-newspaper-frontend
    container_name: dream_frontend_writer
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3003}
    ports:
      - "3001:3000"
    depends_on:
      - frontend-user
    restart: unless-stopped

  # ============================
  # Next.js 프론트엔드 - 스폰서 (3002)
  # ============================
  frontend-sponsor:
    image: dream-newspaper-frontend
    container_name: dream_frontend_sponsor
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3003}
    ports:
      - "3002:3000"
    depends_on:
      - frontend-user
    restart: unless-stopped

volumes:
  postgres_data:
    name: dream_postgres_data
  chroma_data:
    name: dream_chroma_data

networks:
  default:
    name: dream_network
