<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <!-- 배경 -->
  <rect width="2732" height="2732" fill="#1A1A1A"/>

  <!-- 상단 마스트헤드 라인 -->
  <rect x="200" y="900" width="2332" height="6" fill="#F5F0E8" opacity="0.15"/>
  <rect x="200" y="918" width="2332" height="2" fill="#F5F0E8" opacity="0.08"/>

  <!-- 꿈신문사 로고 (중앙) -->
  <text
    x="1366" y="1260"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="420"
    font-weight="900"
    fill="#F5F0E8"
    text-anchor="middle"
    dominant-baseline="middle"
  >꿈</text>

  <!-- 구분선 -->
  <rect x="600" y="1460" width="1532" height="4" fill="#F5F0E8" opacity="0.4"/>
  <rect x="600" y="1474" width="1532" height="1.5" fill="#F5F0E8" opacity="0.15"/>

  <!-- 신문사 텍스트 -->
  <text
    x="1366" y="1570"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="96"
    font-weight="400"
    fill="#F5F0E8"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="30"
    opacity="0.75"
  >신 문 사</text>

  <!-- 슬로건 -->
  <text
    x="1366" y="1720"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="400"
    fill="#F5F0E8"
    text-anchor="middle"
    dominant-baseline="middle"
    opacity="0.35"
    letter-spacing="6"
  >당신의 꿈이 헤드라인이 됩니다</text>

  <!-- 하단 장식선 -->
  <rect x="200" y="1820" width="2332" height="2" fill="#F5F0E8" opacity="0.08"/>
</svg>
