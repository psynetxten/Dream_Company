name: 🍎 iOS Build & Deploy to TestFlight

# 트리거:
# - main 브랜치 push 시 frontend 코드 변경 → 자동 빌드
# - 수동 실행 (workflow_dispatch) → testflight 또는 appstore 선택
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ios-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "배포 대상"
        required: true
        default: "testflight"
        type: choice
        options:
          - testflight
          - appstore

# 동시 실행 방지 (이전 빌드 취소 후 새 빌드 시작)
concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build iOS App & Upload to TestFlight
    runs-on: macos-14   # macos-14(arm64) 버전 고정 — macos-latest는 Xcode 버전이 자동 변경될 수 있음
    timeout-minutes: 60

    steps:
      # ─────────────────────────────────────────
      # 1. 코드 체크아웃
      # ─────────────────────────────────────────
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Node.js 환경 설정
      # ─────────────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ─────────────────────────────────────────
      # 3. npm 의존성 설치
      # ─────────────────────────────────────────
      - name: 📥 Install npm dependencies
        working-directory: frontend
        run: npm ci

      # ─────────────────────────────────────────
      # 4. Next.js 앱 빌드 (모바일용 static export)
      # ─────────────────────────────────────────
      - name: 🔨 Build Next.js app (static export for mobile)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.dreamnewspaper.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_KAKAO_APP_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_APP_KEY }}
        run: npm run build:app

      # ─────────────────────────────────────────
      # 5. Capacitor sync (웹 빌드 → iOS 네이티브 동기화)
      # ─────────────────────────────────────────
      - name: 🔄 Capacitor sync iOS
        working-directory: frontend
        run: npx cap sync ios

      # ─────────────────────────────────────────
      # 6. 빌드 도구 설치 & CocoaPods 의존성
      # ─────────────────────────────────────────
      - name: 🦾 Install build tools & CocoaPods dependencies
        working-directory: frontend/ios/App
        run: |
          # xcpretty: xcodebuild 출력을 읽기 좋게 포맷
          gem install xcpretty --no-document
          # CocoaPods 최신 버전으로 설치
          gem install cocoapods --no-document
          pod install

      # ─────────────────────────────────────────
      # 7. 서명 인증서 임포트
      # GitHub Secret: BUILD_CERTIFICATE_BASE64 (.p12 파일 → base64)
      # GitHub Secret: P12_PASSWORD (.p12 비밀번호)
      # ─────────────────────────────────────────
      - name: 🔐 Import Distribution Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 임시 키체인 생성
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 인증서 디코딩 & 임포트
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # ─────────────────────────────────────────
      # 8. 프로비저닝 프로파일 설치
      # GitHub Secret: BUILD_PROVISION_PROFILE_BASE64 (.mobileprovision → base64)
      # ─────────────────────────────────────────
      - name: 📋 Install Provisioning Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode \
            -o "$PROFILE_PATH/dreamnewspaper_appstore.mobileprovision"

      # ─────────────────────────────────────────
      # 9. Xcode 빌드 & 아카이브
      # ─────────────────────────────────────────
      - name: 🏗️ Build & Archive with Xcode
        working-directory: frontend/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/DreamNewspaper.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="꿈신문사 App Store" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="1.0.0" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      # ─────────────────────────────────────────
      # 10. IPA 익스포트 (Team ID 치환 후 export)
      # ─────────────────────────────────────────
      - name: 📦 Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Team ID 필수 검증
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "❌ APPLE_TEAM_ID secret이 설정되지 않았습니다."
            exit 1
          fi

          # ExportOptions.plist의 Team ID 치환
          sed "s/\$(APPLE_TEAM_ID)/${APPLE_TEAM_ID}/g" \
            frontend/ios/ExportOptions.plist > /tmp/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/DreamNewspaper.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/DreamNewspaper \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      # ─────────────────────────────────────────
      # 11. TestFlight 업로드
      # App Store Connect API Key 사용 (2FA 우회)
      # ─────────────────────────────────────────
      - name: 🚀 Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          # App Store Connect API 키 파일 생성
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_CONTENT" \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          # xcrun notarytool로 TestFlight 업로드 (altool deprecated 대체)
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/DreamNewspaper/App.ipa" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose || \
          # altool 실패 시 notarytool로 폴백 (Xcode 16+)
          xcrun notarytool submit "$RUNNER_TEMP/DreamNewspaper/App.ipa" \
            --key ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait

      # ─────────────────────────────────────────
      # 12. 빌드 결과물 업로드 (디버깅용)
      # ─────────────────────────────────────────
      - name: 📎 Upload IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DreamNewspaper-${{ github.run_number }}.ipa
          path: ${{ runner.temp }}/DreamNewspaper/App.ipa
          retention-days: 7

      # ─────────────────────────────────────────
      # 13. 키체인 정리
      # ─────────────────────────────────────────
      - name: 🧹 Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
